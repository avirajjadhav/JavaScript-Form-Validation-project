<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript form validation</title>
    <link rel="stylesheet" href="style.css">
     <script src="script.js"></script>
</head>
<body>
    <h1>REGISTRATION FORM</h1>
    <form action="" method="post" name="RegForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your Full Name">
        <label for="email">E-mail Address:</label>
        <input type="email" id="email" name="Email" placeholder="Enter your email">
        <label for="number">Contact Number:</label>
        <input type="tel" id="contact" name="contact" placeholder="Enter your Mobile Number">
        <label for="password">Password:</label>
        <input type="password" id="password" name="Password" placeholder="Enter your password">
        <label for="confirmPassword">confirmPassword:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password">
        <input type="checkbox" id="agree" name="Agree" />
        <label for="agree">I agree to the above information</label>
        <p class="btns">
         <input type="submit" value="Send" name="Submit" /> 
         <input type="reset" value="reset" name="reset" /> 
        </p>
        
    </form>
</body>
</html>
